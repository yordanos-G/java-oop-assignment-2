name: Java OOP Autograder

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      checks: write
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        id: test_step
        run: mvn -q clean test
        continue-on-error: true

      - name: Execute Grading Script
        shell: bash
        run: |
          set -euo pipefail

          # --- 1. Rubric Configuration (Single Source of Truth) ---
          W_ENCAP=20
          W_SAVINGS=25
          W_CHECKING=35
          W_CORE=20

          # --- 2. Dynamic XML Discovery ---
          # Finds the report even if the student changes the package name
          XML=$(find target/surefire-reports -name "TEST-*.xml" | head -n 1 || echo "")

          if [ -z "$XML" ] || [ ! -f "$XML" ]; then
            echo "::error title=Build Failed::No test reports found. Check your syntax or project structure!"
            echo "## 🧪 Assignment 02 Results" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Status: Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Your code failed to compile or the tests crashed. See 'Build and Test' logs for details." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # --- 3. Helper Functions ---
          # Isolates the testcase block and checks for failure/error tags
          has_failed() {
            if awk "/<testcase name=\"$1\"/,/<\/testcase>/" "$XML" | grep -qE "<failure|<error"; then
              echo 1
            else
              echo 0
            fi
          }

          # --- 4. Logic Execution ---
          
          # Encapsulation
          E_STATUS="✅"; E_SCORE=$W_ENCAP
          if [ $(has_failed "testEncapsulation") -eq 1 ]; then 
            E_STATUS="❌"; E_SCORE=0
            echo "::warning title=Encapsulation::Balance field must be protected, not public."
          fi

          # Savings Logic
          S_STATUS="✅"; S_SCORE=$W_SAVINGS
          if [ $(has_failed "testSavingsInterest") -eq 1 ]; then 
            S_STATUS="❌"; S_SCORE=0
            echo "::warning title=Savings Logic::Check your interest application formula."
          fi

          # Checking Logic (Grouped tests)
          C_STATUS="✅"; C_SCORE=$W_CHECKING
          C_F1=$(has_failed "testCheckingTransactionFee")
          C_F2=$(has_failed "testCheckingInsufficientWithFee")
          if [ $C_F1 -eq 1 ] || [ $C_F2 -eq 1 ]; then 
            C_STATUS="❌"; C_SCORE=0
            echo "::warning title=Checking Logic::Fix withdrawal fee logic or insufficient fund handling."
          fi

          # Core Logic (Grouped tests)
          B_STATUS="✅"; B_SCORE=$W_CORE
          B_F1=$(has_failed "testBaseDeposit")
          B_F2=$(has_failed "testBaseWithdrawalSafety")
          if [ $B_F1 -eq 1 ] || [ $B_F2 -eq 1 ]; then 
            B_STATUS="❌"; B_SCORE=0
            echo "::warning title=Core Logic::Ensure base deposit/withdraw logic prevents overdrafts."
          fi

          TOTAL_SCORE=$((E_SCORE + S_SCORE + C_SCORE + B_SCORE))

          # --- 5. Generate Professional Summary Table ---
          echo "## 🧪 Assignment 02: Banking System" >> $GITHUB_STEP_SUMMARY
          echo "### Final Grade: **$TOTAL_SCORE / 100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Max | Status | Earned |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :---: | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| Encapsulation | $W_ENCAP | $E_STATUS | $E_SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| Savings Logic | $W_SAVINGS | $S_STATUS | $S_SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| Checking Logic | $W_CHECKING | $C_STATUS | $C_SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Logic | $W_CORE | $B_STATUS | $B_SCORE |" >> $GITHUB_STEP_SUMMARY
          echo "| **TOTAL** | **100** | | **$TOTAL_SCORE** |" >> $GITHUB_STEP_SUMMARY

          echo "Final Score: $TOTAL_SCORE/100"
